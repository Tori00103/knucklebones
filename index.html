<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNUCKLEBONES</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="game_area">
        <div class="player_area">
            <div class="player_1">
                <div class="character">
                    <img class="image character_1" src="resources/img/Pumpkin.png" alt="">
                </div>
                <div class="score_body">
                    <div class="score player_1_score"></div>
                </div>
                <div class="randomizer">
                    <img id="randomDice1">
                </div>
            </div>
        </div>

        <div class="game_zone">
            <div class="main_game">
                <div class="player_field player_1_field">
                    <div class="row row_1">
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <div class="row_sum" id="catSum1Row">X</div>
                    </div>
                    <div class=" row row_2">
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <div class="row_sum" id="catSum2Row">X</div>
                    </div>
                    <div class=" row row_3">
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <div class="row_sum" id="catSum3Row">X</div>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="player_field player_2_field">
                    <div class="row row_1">
                        <div class="row_sum">X</div>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                    </div>
                    <div class=" row row_2">
                        <div class="row_sum">X</div>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                    </div>
                    <div class=" row row_3">
                        <div class="row_sum">X</div>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                        <canvas class="holderCanvas">0</canvas>
                    </div>
                </div>
            </div>

        </div>

        <div class="player_area">
            <div class="player_2">
                <div class="character">
                    <img class="image character_2" src="resources/img/Cat.png" alt="">
                </div>
                <div class="score_body">
                    <div class="score player_2_score">0</div>
                </div>
                <div class="randomizer">
                    <img id="randomDice2">
                </div>
            </div>
        </div>
    </main>
    <script src="animationController.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
